<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle (globe) -->
  <circle cx="256" cy="256" r="240" fill="url(#globeGrad)" stroke="url(#grad)" stroke-width="4"/>
  
  <!-- Globe grid lines - horizontal -->
  <ellipse cx="256" cy="256" rx="240" ry="80" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.3"/>
  <ellipse cx="256" cy="256" rx="240" ry="160" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="16" x2="256" y2="496" stroke="#00F0FF" stroke-width="1" opacity="0.3"/>
  
  <!-- Globe grid lines - vertical -->
  <ellipse cx="256" cy="256" rx="80" ry="240" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.3"/>
  <ellipse cx="256" cy="256" rx="160" ry="240" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.3"/>
  
  <!-- Route path lines -->
  <path d="M 120 350 Q 180 200 256 180 T 392 150" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round"/>
  <path d="M 100 380 Q 200 250 256 200 T 400 180" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Hop dots -->
  <circle cx="120" cy="350" r="10" fill="#00F0FF"/>
  <circle cx="256" cy="180" r="10" fill="#00F0FF"/>
  <circle cx="392" cy="150" r="10" fill="#FF00AA"/>
  
  <!-- Text letters RI -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="url(#grad)" text-anchor="middle" dominant-baseline="middle">RI</text>
</svg>
